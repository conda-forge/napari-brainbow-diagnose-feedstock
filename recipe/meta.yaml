{% set name = "napari-brainbow-diagnose" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ecbf057ee6594f2999e566cb3b219b322102268ba7f42b0293b12253d847fbf8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  script_env:
    - QT_QPA_PLATFORM=offscreen

requirements:
  host:
    - pip
    - python >=3.8,<3.11
    - setuptools-scm
  run:
    - magicgui
    - matplotlib
    - napari
    - numpy
    - pooch
    - python >=3.8,<3.11
    - qtpy
    - scikit-image

test:
  imports:
    - napari_brainbow_diagnose
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://github.com/LaboratoryOpticsBiosciences/napari-brainbow-diagnose
  summary: Visualize and Diagnose brainbow dataset in color space.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
